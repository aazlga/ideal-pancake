<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cairns Pub Deals</title>
    <style>
        :root { 
            --primary: #ff4757; --bg: #0f1115; --card-bg: #1a1d24; 
            --text: #f1f2f6; --text-light: #a4b0be; --border: #2f3542; --accent: #ffa502;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 10px; overflow-x: hidden; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { margin: 0 0 8px 0; font-size: 32px; font-weight: 800; color: #ffffff; }
        .subtitle { color: var(--text-light); margin: 0; font-size: 14px; }
        
        /* Edge-to-edge scrollable picker */
        .day-picker { 
            display: flex; gap: 8px; overflow-x: auto; width: calc(100% + 20px); 
            margin-left: -10px; padding-left: 10px; padding-right: 40px; 
            padding-bottom: 15px; margin-bottom: 25px; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; flex-wrap: nowrap;
        }
        .day-btn { 
            background: transparent; border: 1px solid var(--border); 
            padding: 8px 16px; flex: 0 0 auto; border-radius: 8px; 
            font-weight: 500; font-size: 13px; cursor: pointer; color: var(--text-light); 
            white-space: nowrap; transition: all 0.3s ease; 
        }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .deal-card { background: var(--card-bg); border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .pub-name { font-size: 19px; font-weight: 700; }
        .pub-location { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(255, 165, 2, 0.1); padding: 4px 10px; border-radius: 12px; }
        .deal-text { font-size: 15px; margin-bottom: 18px; }
        .menu-link { display: inline-flex; background: var(--border); color: #ffffff; text-decoration: none; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 8px; }
        footer { text-align: center; margin-top: 60px; font-size: 12px; color: var(--text-light); border-top: 1px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cairns Pub Deals</h1>
        <p class="subtitle" id="liveDate">Loading...</p>
    </header>

    <div class="day-picker" id="dayPicker"></div>

    <div id="dealsContainer"></div>

    <footer>
        <p>Deals are subject to change. Please check with the venue directly.</p>
        <p>Join the conversation on <a href="https://www.reddit.com/r/cairnsfood" target="_blank">r/Cairnsfood</a>.</p>
    </footer>
</div>

<script>
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    let selectedDay = new Date().toLocaleString("en-AU", { timeZone: "Australia/Brisbane", weekday: "long" });
    let masterDealsArray = [];

    const picker = document.getElementById('dayPicker');
    days.forEach(day => {
        const btn = document.createElement('button');
        btn.className = `day-btn ${day === selectedDay ? 'active' : ''}`;
        btn.innerText = day;
        btn.onclick = () => {
            selectedDay = day;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderDeals();
        };
        picker.appendChild(btn);
    });

    function renderDeals() {
        const container = document.getElementById('dealsContainer');
        container.innerHTML = '';
        const filtered = masterDealsArray.filter(item => 
            item.Day.toLowerCase() === selectedDay.toLowerCase() || item.Day.toLowerCase() === 'daily'
        );

        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px;">No specials for ${selectedDay} yet.</div>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'deal-card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="pub-name">${item["Pub Name"]}</span>
                    <span class="pub-location">${item.Location}</span>
                </div>
                <div class="deal-text">${item.Deal} - <strong>${item.Price}</strong></div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <a href="${item.Url}" target="_blank" class="menu-link">View Menu ↗</a>
                    <span style="font-size: 11px; color: var(--text-light);">Updated: ${item["Last Updated"]}</span>
                </div>
